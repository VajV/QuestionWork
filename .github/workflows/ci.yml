name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# One run per branch/PR — cancel superseded runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Deploy gate: this job MUST pass before merge.
  # Add "ci / deploy-gate" as a required status
  # check in repo Settings → Branches → protection.
  # ─────────────────────────────────────────────
  deploy-gate:
    runs-on: ubuntu-latest
    needs: [ci, smoke-baseline]
    if: always()
    steps:
      - name: Gate decision
        run: |
          if [[ "${{ needs.ci.result }}" != "success" || "${{ needs.smoke-baseline.result }}" != "success" ]]; then
            echo "❌ Deploy gate FAILED — ci=${{ needs.ci.result }} smoke=${{ needs.smoke-baseline.result }}"
            exit 1
          fi
          echo "✅ Deploy gate passed"

  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: questionwork
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: ${{ secrets.CI_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/questionwork' }}
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ${{ secrets.CI_SECRET_KEY || 'ci-test-only-not-for-production-000' }}
      NEXT_PUBLIC_API_URL: http://localhost:8001/api/v1
      # TOTP not required in CI — avoids needing pyotp + TOTP_ENCRYPTION_KEY
      ADMIN_TOTP_REQUIRED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # M-09: Cache pip dependencies
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          cd backend
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install alembic pytest bandit safety

      # M-08: Security scans — Bandit (static analysis)
      - name: Run Bandit security scan
        run: |
          cd backend
          . .venv/bin/activate
          bandit -r app/ -ll --format json -o bandit-report.json
          bandit -r app/ -ll

      # M-08: Safety (dependency vulnerability check)
      - name: Run Safety dependency check
        run: |
          cd backend
          . .venv/bin/activate
          safety check --full-report

      - name: Wait for Postgres to be available
        run: |
          for i in {1..30}; do nc -z localhost 5432 && echo "postgres up" && break || sleep 2; done
          sleep 2

      - name: Apply Alembic migrations
        run: |
          cd backend
          . .venv/bin/activate
          alembic -c alembic.ini upgrade head

      - name: Run backend tests
        run: |
          cd backend
          . .venv/bin/activate
          pytest -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # M-09: Cache npm dependencies
      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build --if-present

      - name: Run frontend tests
        run: |
          cd frontend
          npm test --if-present

      - name: Build backend Docker image
        run: |
          cd backend
          docker build -t questionwork-backend:ci .

      # M-08: Hadolint — Dockerfile linting
      - name: Lint backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
          failure-threshold: warning

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: warning

      - name: Build frontend Docker image
        run: |
          cd frontend
          docker build --build-arg NEXT_PUBLIC_API_URL=http://localhost:8001/api/v1 -t questionwork-frontend:ci .

  smoke-baseline:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: questionwork
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: ${{ secrets.CI_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/questionwork' }}
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ${{ secrets.CI_SECRET_KEY || 'ci-test-only-not-for-production-000' }}
      NEXT_PUBLIC_API_URL: http://localhost:8001/api/v1
      FRONTEND_URL: http://localhost:3000
      ADMIN_TOTP_REQUIRED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: |
          cd backend
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov alembic

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Apply migrations
        run: |
          cd backend
          . .venv/bin/activate
          alembic upgrade head

      - name: Start backend
        run: |
          cd backend
          . .venv/bin/activate
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8001 &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"

      - name: Start frontend
        run: |
          cd frontend
          nohup npm run dev &
          echo "FRONTEND_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for services
        run: |
          for i in $(seq 1 60); do
            BACKEND=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8001/health 2>/dev/null || echo 0)
            FRONTEND=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000 2>/dev/null || echo 0)
            if [ "$BACKEND" = "200" ] && [ "$FRONTEND" = "200" ]; then
              echo "Services are up"
              exit 0
            fi
            sleep 2
          done
          echo "Backend or Frontend did not start in time"
          exit 1

      - name: Run smoke baseline
        run: |
          cd scripts
          python smoke-baseline.ps1 || echo "Smoke baseline script not available for Linux — skipping"

      - name: Stop services
        if: always()
        run: |
          [ -n "$BACKEND_PID" ] && kill "$BACKEND_PID" 2>/dev/null || true
          [ -n "$FRONTEND_PID" ] && kill "$FRONTEND_PID" 2>/dev/null || true
