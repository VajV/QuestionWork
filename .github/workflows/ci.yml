name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: questionwork
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/questionwork
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ci-secret-key
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd backend
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install alembic pytest

      - name: Wait for Postgres to be available
        run: |
          for i in {1..30}; do nc -z localhost 5432 && echo "postgres up" && break || sleep 2; done
          sleep 2

      - name: Apply Alembic migrations
        run: |
          cd backend
          . .venv/bin/activate
          alembic -c alembic.ini upgrade head || true

      - name: Run backend tests
        run: |
          cd backend
          . .venv/bin/activate
          pytest -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build --if-present

      - name: Run frontend tests
        run: |
          cd frontend
          npm test --if-present
