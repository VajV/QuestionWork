version: "3.9"
services:
  questionwork_postgres:
    image: postgres:15
    container_name: questionwork_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-questionwork}
    volumes:
      - questionwork_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

  questionwork_redis:
    image: redis:7
    container_name: questionwork_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"]
    volumes:
      - questionwork_redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.74.0
    container_name: questionwork_otel_collector
    restart: unless-stopped
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    command: ["--config", "/etc/otel-collector-config.yml"]
    ports:
      - "127.0.0.1:4318:4318" # OTLP HTTP receiver
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4318/v1/traces || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M

  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: questionwork_jaeger
    restart: unless-stopped
    ports:
      - "127.0.0.1:16686:16686" # Jaeger UI
      - "127.0.0.1:14268:14268" # Jaeger collector (HTTP)
    environment:
      COLLECTOR_ZIPKIN_HTTP_PORT: 9411
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M

  questionwork_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: questionwork_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@questionwork_postgres:5432/${POSTGRES_DB:-questionwork}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@questionwork_redis:6379/0"
    volumes:
      - ./backend:/app
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      questionwork_postgres:
        condition: service_healthy
      questionwork_redis:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--reload", "--host", "0.0.0.0", "--port", "8001"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  questionwork_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: questionwork_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "http://127.0.0.1:8001/api/v1"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - questionwork_backend
    command: ["npm", "run", "dev"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

volumes:
  questionwork_postgres_data:
  questionwork_redis_data:

networks:
  default:
    name: questionwork_network
